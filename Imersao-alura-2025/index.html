<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explore nossa galeria exclusiva de carros com body kits Liberty Walk e Rocket Bunny">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Body Kit Gallery - Liberty Walk & Rocket Bunny</title>
</head>

<body>
    <div id="containerImgOwner" class="img-side wataruKato">
        <img id="owner" src="img/wataruKato.png" alt="owner">
    </div>

    <div id="containerNameOwner" class="containerNameOwner">
        Owner: <span id="nameOwner" class="nameOwner">Wataru Kato</span>
    </div>

    <div class="container">
        <header class="header">
            <h1 id="brand-title" class="brand-title">Liberty Walk</h1>
            <p class="subtitle">Clique no título para alternar entre marcas • Pesquise para filtrar</p>

            <div class="controls">
                <div class="search">
                    <svg class="ico" viewBox="0 0 24 24" aria-hidden>
                        <path fill="currentColor"
                            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 14a4 4 0 110-8 4 4 0 010 8z" />
                    </svg>
                    <input id="search-input" type="text" placeholder="Buscar por título, carro ou marca..." />
                    <button id="clear-search" title="Limpar">✕</button>
                </div>
            </div>
        </header>

        <main id="card-container" class="card-container"></main>

        <div id="no-results" class="no-results">
            <p>Nenhum resultado encontrado</p>
        </div>
    </div>

    <div id="containerBrand" class="containerBrand lb">
        <img id="brand" src="img/logoLB3.png" alt="logo brand">
    </div>

    <!-- Modal -->
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div id="modal" class="modal">
        <button id="modal-close" class="modal-close" aria-label="Fechar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="modal-image-container">
            <img id="modal-image" src="" alt="" class="modal-image">

            <button id="prev-btn" class="carousel-btn carousel-btn-left" aria-label="Imagem anterior">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <button id="next-btn" class="carousel-btn carousel-btn-right" aria-label="Próxima imagem">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>

            <div id="carousel-dots" class="carousel-dots"></div>
        </div>

        <div class="modal-content">
            <h2 id="modal-titulo" class="modal-title"></h2>

            <div class="modal-grid">
                <div class="modal-info-item">
                    <p class="modal-info-label">Nome</p>
                    <p id="modal-nomeCar" class="modal-info-value"></p>
                </div>

                <div class="modal-info-item">
                    <p class="modal-info-label">Marca</p>
                    <p id="modal-marcaCar" class="modal-info-value"></p>
                </div>

                <div class="modal-info-item">
                    <p class="modal-info-label">Página Oficial</p>
                    <a id="modal-pagina" class="modal-info-value" href="" target="_blank">Liberty Walk</a>
                </div>

                <div class="modal-info-item modal-info-full">
                    <p class="modal-info-label">Body Kit</p>
                    <p id="modal-marcaBodyKit" class="modal-info-value-primary"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
